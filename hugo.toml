baseURL = 'https://pushkalsingh.github.io/tohfa/'
languageCode = 'en-us'
title = 'Tohfa - Luxury Brass Gifts'
defaultContentLanguage = 'en'
locale = 'en-us'

# We define the theme as a module path
theme = "github.com/bep/galleriesdeluxe"

[params]
  description = "Exquisite handcrafted brass gifts and accessories."
  copyright = "Pushkal Singh"

[module]
  # 1. The main gallery theme logic
  [[module.imports]]
    path = "github.com/bep/galleriesdeluxe"

  # 2. The missing piece that fixes the "head-seo.html" error
  [[module.imports]]
    path = "github.com/bep/hugo-mod-misc/common-partials"

[mediaTypes]
  # Required by Galleries Deluxe for image and redirect processing
  [mediaTypes."text/netlify"]
    suffixes = ["redirects"]

[outputFormats]
  [outputFormats.REDIRECTS]
    mediaType = "text/netlify"
    baseName = "_redirects"
    notAlternative = true

[outputs]
  # Home page needs these formats for the theme to function
  home = ["HTML", "RSS", "REDIRECTS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Allows the theme to render custom HTML gallery layouts
      unsafe = true

[imaging]
  # Galleries Deluxe performs heavy image processing; 
  # these settings help Hugo handle your product photos.
  resampleFilter = "box"
  quality = 90
  anchor = "Smart"